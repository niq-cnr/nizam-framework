name: pages

# Publishes the self-contained HTML user guide (docs/guide/) to GitHub
# Pages — the human gate recorded open since phase 003 (ROADMAP Track 1
# item 2). The site is the guide directory itself; docs/guide/index.html
# is the page.
#
# ONE-TIME PREREQUISITE (operator): enable Pages with Source "GitHub
# Actions" (Settings -> Pages). The default GITHUB_TOKEN cannot CREATE the
# Pages site (site creation needs administration scope, which
# configure-pages' enablement option can only exercise with a PAT/App
# token — a heavier secret than the one-click setting justifies). Until
# Pages is enabled, this job fails loudly at the configure step; after the
# one-time enable, every run publishes automatically.
#
# The three Pages deploy actions below are pinned to major-version tags,
# not commit SHAs, unlike this repository's other workflows: resolving the
# SHAs requires reading the external action repositories, which the
# authoring session's repository scope could not reach. Reviewers may
# harden the pins to SHAs.

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "docs/guide/**"
      - ".github/workflows/pages.yml"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Permissions are job-scoped (not workflow-level) so any future job in
    # this file does not silently inherit Pages-write or OIDC privileges:
    #   contents: read  — checkout of the guide sources
    #   pages: write    — create the Pages deployment
    #   id-token: write — OIDC token deploy-pages uses to authenticate
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Configure GitHub Pages (requires the one-time Pages enable, see header)
        uses: actions/configure-pages@v5

      - name: Upload the user guide as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/guide

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
