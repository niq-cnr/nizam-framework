name: retitle-v070-oneshot

# ONE-SHOT, branch-scoped remediation runner for NDEBT-025's live symptom:
# the v0.7.0 GitHub Release page was auto-published with the merge-commit
# subject as its title. The workflow-dispatch API is not accessible to the
# operating integration (403), so this temporary workflow runs on push to
# its own remediation branch, re-derives the title with EXACTLY the fixed
# release.yml extraction logic (re-fetch the genuine tag object; derive
# from its real object type; fail loudly on remote/local type
# disagreement), and edits the existing Release title in place. It touches
# the title only — the published notes stay untouched. This file is
# REMOVED by a follow-up commit on the same branch once the run succeeds;
# it never lands on main.

on:
  push:
    branches: ["chore/post-v0.7.0-actions"]

permissions:
  contents: write

jobs:
  retitle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Re-derive the v0.7.0 title from the genuine tag object and edit the Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.7.0
        run: |
          set -euo pipefail
          git rev-parse -q --verify "refs/tags/$TAG" >/dev/null || {
            echo "FATAL: tag '$TAG' does not exist on this repository." >&2; exit 1
          }
          git fetch --force --no-tags origin "+refs/tags/$TAG:refs/tags/$TAG"
          OBJTYPE="$(git cat-file -t "$(git rev-parse "refs/tags/$TAG")")"
          REMOTE_PEELED="$(git ls-remote origin "refs/tags/$TAG" | grep -c '\^{}' || true)"
          if [ "$REMOTE_PEELED" -ge 1 ] && [ "$OBJTYPE" != "tag" ]; then
            echo "FATAL: remote tag '$TAG' is annotated but the local ref resolves to a $OBJTYPE object (NDEBT-025)." >&2
            exit 1
          fi
          if [ "$OBJTYPE" = "tag" ]; then
            TITLE="$(git for-each-ref "refs/tags/$TAG" --format='%(contents:subject)')"
          else
            TITLE="$TAG"
          fi
          [ -n "$TITLE" ] || TITLE="$TAG"
          echo "Derived title: $TITLE (object type: $OBJTYPE)"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TITLE"
          echo "Release $TAG retitled."
