name: compliance

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # fetch-depth: 0 is load-bearing, not hardening: tools/validate.sh's
          # C8 check (NDS Sec 4 version-bump-vs-changelog) runs
          # `git show HEAD:<path>` for every shipped-doc file and treats a
          # failed lookup as "new file, skip comparison". GitHub Actions'
          # default shallow checkout would leave HEAD's history/object graph
          # incomplete on both the pull_request (merge-ref) and push (main)
          # trigger contexts, so full history is required here.
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.x"

      - run: pip install jsonschema pyyaml

      - run: bash tools/validate.sh

  e2e_bootstrap:
    runs-on: ubuntu-latest
    steps:
      # No fetch-depth override here (unlike the validate job): the harness's
      # ephemeral tag is created locally on this checkout's own HEAD (a
      # commit object present regardless of clone depth), and bootstrap.sh's
      # own --depth 1 file:// self-clone from this checkout succeeds whether
      # the checkout itself is shallow or full (empirically verified at
      # contract-authoring time: a real shallow clone tagged on its own HEAD
      # still clones successfully via --depth 1 file://). GitHub Actions' own
      # default (a shallow, depth-1 checkout) applies.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.x"

      # jsonschema + pyyaml are required because, as of phase-006 feature 050,
      # the harness's assert_payload_validate_cwd_independent runs
      # `tools/validate.sh --payload` against the injected payload (proving
      # NDEBT-012 / issue #18 is fixed), and validate.sh fails closed on a
      # missing jsonschema/yaml module. Before F-050 the e2e exercised only
      # bootstrap.sh (which needs neither), so this step is new to this job.
      - run: pip install jsonschema pyyaml

      - run: bash tools/e2e_bootstrap_test.sh
